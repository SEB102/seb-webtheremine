<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SEB-WEBTHEREMINE</title>
  <style>
    :root {
      --bg: #0a0a10; --panel: #12121c; --accent: #00e87a;
      --dim: #333; --text: #bbb;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Courier New', monospace;
      display: flex; flex-direction: column; align-items: center;
      min-height: 100vh; gap: 6px; padding: 8px;
    }
    h1 {
      color: var(--accent); font-size: 1em;
      letter-spacing: .5em; text-transform: uppercase; padding: 6px 0;
    }
    #video-wrap { position: relative; line-height: 0; border: 1px solid #1a1a2a; width: 100%; max-width: 640px; }
    #videoel { display: none; }
    #overlay { display: block; cursor: crosshair; width: 100%; height: auto; touch-action: none; }
    .panel {
      background: var(--panel); border: 1px solid #1e1e30;
      border-radius: 4px; padding: 7px 12px;
      display: flex; flex-wrap: wrap; gap: 10px;
      align-items: center; width: 100%; max-width: 640px;
    }
    button {
      background: transparent; color: var(--accent);
      border: 1px solid var(--accent); padding: 5px 13px;
      cursor: pointer; font-family: monospace; font-size: .82em;
      border-radius: 3px; transition: background .12s; white-space: nowrap;
    }
    button:hover { background: rgba(0,232,122,.1); }
    button.on { background: var(--accent); color: #000; font-weight: bold; }
    label { display: flex; align-items: center; gap: 5px; font-size: .78em; color: #555; }
    label span { color: var(--text); }
    select {
      background: var(--bg); color: var(--text);
      border: 1px solid #2a2a3a; padding: 3px 5px;
      font-family: monospace; font-size: .78em; border-radius: 2px;
    }
    input[type=range] { width: 70px; accent-color: var(--accent); }
    input[type=checkbox] { accent-color: var(--accent); width: 13px; height: 13px; }
    #note-big {
      font-size: 1.5em; color: var(--accent); font-weight: bold;
      min-width: 72px; text-align: center; letter-spacing: .05em;
    }
    #note-editor { display: none; width: 100%; max-width: 640px; }
    #note-editor.open { display: block; }
    .note-editor-hdr {
      background: var(--panel); border: 1px solid #1e1e30;
      border-bottom: none; border-radius: 4px 4px 0 0;
      padding: 5px 12px; font-size: .75em; color: #555;
      display: flex; justify-content: space-between; align-items: center;
    }
    .note-editor-hdr button {
      border: none; padding: 2px 8px; font-size: .78em;
      color: #555; border-color: #333;
    }
    .note-grid {
      background: var(--panel); border: 1px solid #1e1e30;
      border-top: none; border-radius: 0 0 4px 4px;
      padding: 6px;
      display: grid; grid-template-columns: repeat(15, 1fr); gap: 3px;
    }
    .note-cell { display: flex; flex-direction: column; align-items: center; gap: 1px; }
    .note-cell .idx { font-size: .58em; color: #333; }
    .note-cell input {
      width: 100%; background: var(--bg); color: var(--accent);
      border: 1px solid #2a2a3a; text-align: center;
      font-family: monospace; font-size: .68em; padding: 3px 1px;
      border-radius: 2px;
    }
    .note-cell input:focus { border-color: var(--accent); outline: none; }
    #status { font-size: .7em; color: #3a3a5a; text-align: center; }
    body { touch-action: manipulation; user-select: none; }
    @media (max-width: 500px) {
      h1 { font-size: .8em; letter-spacing: .2em; }
      button { padding: 9px 12px; font-size: .9em; }
      select, input[type=range] { font-size: .85em; }
      .note-grid { grid-template-columns: repeat(5, 1fr); }
      #note-big { font-size: 1.2em; }
    }
    #video-wrap:fullscreen,
    #video-wrap:-webkit-full-screen {
      width: 100vw !important; max-width: none !important;
      height: 100vh; background: #000;
      display: flex; align-items: center; justify-content: center;
    }
    #video-wrap:fullscreen #overlay,
    #video-wrap:-webkit-full-screen #overlay {
      width: min(100vw, calc(100vh * 4 / 3)) !important;
      height: min(100vh, calc(100vw * 3 / 4)) !important;
    }
  </style>
</head>
<body>
  <h1>⚡ SEB-WEBTHEREMINE</h1>

  <div id="video-wrap">
    <video id="videoel" width="640" height="480"></video>
    <canvas id="overlay" width="640" height="480"></canvas>
  </div>

  <div class="panel">
    <button id="btn-start">▶ START</button>
    <label><span>Gamme</span>
      <select id="sel-scale">
        <option value="M">Majeur</option>
        <option value="mh">min. harm.</option>
        <option value="Penta">Pentatonique</option>
        <option value="Myx">Mixolydien</option>
        <option value="Dor">Dorien</option>
      </select>
    </label>
    <label><span>Fond.</span>
      <select id="sel-root">
        <option value="60">DO4</option>
        <option value="62">RÉ4</option>
        <option value="64">MI4</option>
        <option value="65">FA4</option>
        <option value="67">SOL4</option>
        <option value="69">LA4</option>
        <option value="71">SI4</option>
        <option value="72">DO5</option>
      </select>
    </label>
    <label><span>Main</span>
      <select id="sel-hand">
        <option value="left">Gauche</option>
        <option value="right">Droite</option>
      </select>
    </label>
    <label><span>Cam</span>
      <select id="sel-cam"><option value="">Auto</option></select>
    </label>
    <label><span>Vol</span>
      <input id="rng-vol" type="range" min="0" max="1" step="0.01" value="0.7">
    </label>
    <label>
      <input id="chk-mirror" type="checkbox" checked>
      <span>Miroir</span>
    </label>
    <label><span>Son</span>
      <select id="sel-son">
        <option value="theremin">Thérémine</option>
        <option value="martenot">Onde Martenot</option>
        <option value="padwarm">Pad warm</option>
      </select>
    </label>
    <div id="note-big">—</div>
    <button id="btn-edit" style="margin-left:auto">NOTES ▾</button>
    <button id="btn-fs" title="Plein écran">⛶</button>
  </div>

  <div id="note-editor">
    <div class="note-editor-hdr">
      <span>Notes — nom FR (ex: LA4) ou numéro MIDI</span>
      <button id="btn-regen">↺ Regénérer</button>
    </div>
    <div class="note-grid" id="note-grid"></div>
  </div>

  <div id="status">Chargement du modèle MediaPipe…</div>

<script type="module">
(async () => {

// ── SCALES ──────────────────────────────────────────────────────────────────
const SCALES = {
  M:     [0,2,4,5,7,9,11],
  mh:    [0,2,3,5,7,8,11],
  Penta: [0,2,4,7,9],
  Myx:   [0,2,4,5,7,9,10],
  Dor:   [0,2,3,5,7,9,10]
};

const FR = ['DO','DO#','RÉ','RÉ#','MI','FA','FA#','SOL','SOL#','LA','LA#','SI'];

function midiToName(m) {
  if (m < 0 || m > 127) return '?';
  return FR[m % 12] + (Math.floor(m / 12) - 1);
}
function midiToFreq(m) { return 440 * Math.pow(2, (m - 69) / 12); }

function genNotes(root, mode, n = 15) {
  const ivs = SCALES[mode];
  const out = []; let oct = 0, i = 0;
  while (out.length < n) {
    const note = root + oct * 12 + ivs[i % ivs.length];
    if (note <= 127) out.push(note);
    if (++i % ivs.length === 0) oct++;
    if (oct > 6) break;
  }
  return out;
}

function parseFR(s) {
  const n = parseInt(s);
  if (!isNaN(n) && n >= 0 && n <= 127) return n;
  const up = s.trim().toUpperCase();
  const map = [
    ['SOL#',8],['DO#',1],['RÉ#',3],['RE#',3],['FA#',6],['LA#',10],
    ['SOL',7],['DO',0],['RÉ',2],['RE',2],['MI',4],['FA',5],['LA',9],['SI',11]
  ];
  for (const [name, st] of map) {
    if (up.startsWith(name)) {
      const oct = parseInt(up.slice(name.length));
      if (!isNaN(oct) && oct >= -1 && oct <= 9) return (oct + 1) * 12 + st;
    }
  }
  return null;
}

// ── STATE ────────────────────────────────────────────────────────────────────
let notes     = genNotes(60, 'M');
let running   = false;
let mirrored  = true;
let handChoice = 'left'; // 'left' or 'right' from user's perspective
let activeIdx = -1;
let activeVol = 0;

// ── PRESETS SON ──────────────────────────────────────────────────────────────
const PRESETS_SON = {
  theremin: { oscType:'sawtooth', vibratoHz:5.2, vibratoDepth:5, filterQ:2.5, filterBase:900,  attack:0.012, release:0.07,  reverbMix:0.28, octaveShift:0  },
  martenot: { oscType:'sine',     vibratoHz:4.0, vibratoDepth:2, filterQ:0.7, filterBase:2200, attack:0.06,  release:0.15,  reverbMix:0.45, octaveShift:0  },
  padwarm:  { oscType:'sine',     vibratoHz:4.0, vibratoDepth:0, filterQ:0.4, filterBase:3000, attack:0.9,   release:3.0,   reverbMix:0.55, octaveShift:-2 }
};
let sonMode = 'theremin';

// Retourne true si ce côté MediaPipe correspond à la main choisie par l'utilisateur.
// En vue miroir, MP "Left" = main droite de l'utilisateur, et vice-versa.
function isControlHand(side) {
  if (mirrored) {
    return handChoice === 'left' ? side === 'Left' : side === 'Right';
  } else {
    return handChoice === 'left' ? side === 'Right' : side === 'Left';
  }
}

// ── NOTE EDITOR ──────────────────────────────────────────────────────────────
const noteGrid   = document.getElementById('note-grid');
const noteInputs = [];

function buildNoteGrid() {
  noteGrid.innerHTML = '';
  noteInputs.length = 0;
  notes.forEach((midi, i) => {
    const cell = document.createElement('div');
    cell.className = 'note-cell';
    const idx = document.createElement('div');
    idx.className = 'idx';
    idx.textContent = i + 1;
    const inp = document.createElement('input');
    inp.type = 'text';
    inp.value = midiToName(midi);
    inp.addEventListener('change', () => {
      const v = parseFR(inp.value);
      if (v !== null) { notes[i] = v; inp.value = midiToName(v); }
      else inp.value = midiToName(notes[i]);
    });
    noteInputs.push(inp);
    cell.appendChild(idx);
    cell.appendChild(inp);
    noteGrid.appendChild(cell);
  });
}
buildNoteGrid();

const selScale = document.getElementById('sel-scale');
const selRoot  = document.getElementById('sel-root');

function regenFromScale() {
  notes = genNotes(parseInt(selRoot.value), selScale.value);
  buildNoteGrid();
}

document.getElementById('btn-edit').addEventListener('click', () =>
  document.getElementById('note-editor').classList.toggle('open'));
document.getElementById('btn-regen').addEventListener('click', regenFromScale);
selScale.addEventListener('change', regenFromScale);
selRoot.addEventListener('change', regenFromScale);

document.getElementById('sel-hand').addEventListener('change', e => {
  handChoice = e.target.value;
});

document.getElementById('chk-mirror').addEventListener('change', e => {
  mirrored = e.target.checked;
});

// ── CAMERA SELECTION ──────────────────────────────────────────────────────────
const selCam = document.getElementById('sel-cam');
let currentStream = null;
let animFrame = null;

async function enumerateCameras() {
  try {
    const devices = await navigator.mediaDevices.enumerateDevices();
    const cams = devices.filter(d => d.kind === 'videoinput');
    const prev = selCam.value;
    selCam.innerHTML = '<option value="">Auto</option>';
    cams.forEach((cam, i) => {
      const o = document.createElement('option');
      o.value = cam.deviceId;
      o.textContent = cam.label || `Caméra ${i + 1}`;
      if (cam.deviceId === prev) o.selected = true;
      selCam.appendChild(o);
    });
  } catch (_) {}
}
enumerateCameras();

async function startCamera() {
  if (currentStream) {
    currentStream.getTracks().forEach(t => t.stop());
    currentStream = null;
  }
  const constraints = { video: {
    width: { ideal: 640 }, height: { ideal: 480 },
    ...(selCam.value ? { deviceId: { exact: selCam.value } } : {})
  }};
  currentStream = await navigator.mediaDevices.getUserMedia(constraints);
  video.srcObject = currentStream;
  await video.play();
  await enumerateCameras(); // relabels after permission granted
}

function frameLoop() {
  if (!running) return;
  if (video.readyState >= 2 && video.currentTime !== lastT) {
    lastT = video.currentTime;
    drawFrame(hl.detectForVideo(video, performance.now()));
  }
  animFrame = requestAnimationFrame(frameLoop);
}

selCam.addEventListener('change', async () => {
  if (running) {
    cancelAnimationFrame(animFrame);
    await startCamera();
    frameLoop();
  }
});

// ── AUDIO ────────────────────────────────────────────────────────────────────
let audioCtx, osc, vibratoOsc, vibratoGain, filter, envGain, masterGain, reverbGain;
let padOsc1, padOsc2, padGain;
let audioReady = false;

function makeReverb(ctx) {
  const conv = ctx.createConvolver();
  const sr = ctx.sampleRate, len = sr * 2;
  const buf = ctx.createBuffer(2, len, sr);
  for (let c = 0; c < 2; c++) {
    const d = buf.getChannelData(c);
    for (let i = 0; i < len; i++)
      d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 2);
  }
  conv.buffer = buf;
  return conv;
}

async function initAudio() {
  if (audioReady) return;
  audioReady = true;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  await audioCtx.resume();

  const p = PRESETS_SON[sonMode];
  osc = audioCtx.createOscillator();
  osc.type = p.oscType;
  osc.frequency.value = 261.63;

  vibratoOsc = audioCtx.createOscillator();
  vibratoOsc.frequency.value = p.vibratoHz;
  vibratoGain = audioCtx.createGain();
  vibratoGain.gain.value = p.vibratoDepth;
  vibratoOsc.connect(vibratoGain);
  vibratoGain.connect(osc.frequency);
  vibratoOsc.start();

  filter = audioCtx.createBiquadFilter();
  filter.type = 'lowpass';
  filter.frequency.value = p.filterBase;
  filter.Q.value = p.filterQ;

  envGain = audioCtx.createGain();
  envGain.gain.value = 0;

  masterGain = audioCtx.createGain();
  masterGain.gain.value = parseFloat(document.getElementById('rng-vol').value);

  const reverb = makeReverb(audioCtx);
  reverbGain = audioCtx.createGain();
  reverbGain.gain.value = p.reverbMix;

  padOsc1 = audioCtx.createOscillator();
  padOsc2 = audioCtx.createOscillator();
  padGain = audioCtx.createGain();
  padOsc1.type = 'sine'; padOsc2.type = 'sine';
  padOsc1.detune.value = -12; padOsc2.detune.value = +12;
  padOsc1.connect(padGain); padOsc2.connect(padGain);
  padGain.gain.value = sonMode === 'padwarm' ? 0.7 : 0;
  padOsc1.start(); padOsc2.start();

  osc.connect(filter);
  padGain.connect(filter);
  filter.connect(envGain);
  envGain.connect(masterGain);
  envGain.connect(reverb);
  reverb.connect(reverbGain);
  reverbGain.connect(masterGain);
  masterGain.connect(audioCtx.destination);
  osc.start();
}

document.getElementById('rng-vol').addEventListener('input', e => {
  if (masterGain)
    masterGain.gain.setTargetAtTime(+e.target.value, audioCtx.currentTime, 0.05);
});

function playNote(idx, vol) {
  if (!audioCtx || !running) return;
  if (audioCtx.state === 'suspended' || audioCtx.state === 'interrupted') audioCtx.resume();
  const p = PRESETS_SON[sonMode];
  if (idx >= 0 && vol > 0.02) {
    const freq = midiToFreq(notes[idx]) * Math.pow(2, p.octaveShift);
    osc.frequency.setTargetAtTime(freq, audioCtx.currentTime, 0.03);
    if (sonMode === 'padwarm') {
      padOsc1.frequency.setTargetAtTime(freq, audioCtx.currentTime, 0.05);
      padOsc2.frequency.setTargetAtTime(freq, audioCtx.currentTime, 0.05);
    }
    filter.frequency.setTargetAtTime(p.filterBase + vol * 2000, audioCtx.currentTime, 0.03);
    envGain.gain.setTargetAtTime(vol * 0.7, audioCtx.currentTime, p.attack);
    activeIdx = idx;
    activeVol = vol;
  } else {
    envGain.gain.setTargetAtTime(0, audioCtx.currentTime, p.release);
    activeIdx = -1;
    activeVol = 0;
  }
}

// ── MEDIAPIPE ────────────────────────────────────────────────────────────────
const video   = document.getElementById('videoel');
const overlay = document.getElementById('overlay');
const ctx2d   = overlay.getContext('2d');

const vision = await import(
  "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.35/vision_bundle.mjs"
);
const { HandLandmarker, FilesetResolver, DrawingUtils } = vision;
const dwUtils = new DrawingUtils(ctx2d);

const fs = await FilesetResolver.forVisionTasks(
  "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.35/wasm"
);
const hl = await HandLandmarker.createFromOptions(fs, {
  baseOptions: {
    modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task',
    delegate: 'GPU'
  },
  runningMode: 'VIDEO',
  numHands: 2
});

document.getElementById('status').textContent =
  'Modèle prêt — cliquer START, puis autoriser la caméra';

// ── DRAW ─────────────────────────────────────────────────────────────────────
function drawFrame(res) {
  const W = overlay.width, H = overlay.height;
  const N = notes.length;
  const zW = W / N;
  const scale = W / (overlay.offsetWidth || W);

  ctx2d.clearRect(0, 0, W, H);

  // Draw video (mirrored if needed)
  ctx2d.save();
  if (mirrored) { ctx2d.translate(W, 0); ctx2d.scale(-1, 1); }
  ctx2d.drawImage(video, 0, 0, W, H);
  ctx2d.restore();

  // Note zone bands
  for (let i = 0; i < N; i++) {
    const x = i * zW;
    const active = i === activeIdx;
    ctx2d.fillStyle = 'rgba(255,255,255,0.025)';
    ctx2d.fillRect(x, 0, zW - 1, H);
    if (active) {
      const bH = activeVol * H;
      ctx2d.fillStyle = 'rgba(0,232,122,0.25)';
      ctx2d.fillRect(x, H - bH, zW - 1, bH);
    }
    ctx2d.strokeStyle = active ? '#00e87a' : '#252530';
    ctx2d.lineWidth = active ? 2 : 1;
    ctx2d.beginPath(); ctx2d.moveTo(x, 0); ctx2d.lineTo(x, H); ctx2d.stroke();
    ctx2d.fillStyle = active ? '#00e87a' : '#2e2e44';
    const fs = Math.round(10 * scale);
    ctx2d.font = active ? `bold ${fs + 1}px monospace` : `${fs}px monospace`;
    ctx2d.textAlign = 'center';
    ctx2d.fillText(midiToName(notes[i]), x + zW / 2, fs + 4);
  }

  // Hand landmarks & control
  let controlled = false;

  if (res.landmarks && res.handednesses) {
    for (let h = 0; h < res.handednesses.length; h++) {
      const side    = res.handednesses[h][0].categoryName;
      const lm      = res.landmarks[h];
      const isCtrl  = isControlHand(side);
      const color   = isCtrl ? '#00e87a' : '#ff6633';

      // Centroïde en espace écran
      const cx = lm.reduce((s, pt) => s + pt.x, 0) / lm.length;
      const cy = lm.reduce((s, pt) => s + pt.y, 0) / lm.length;
      const sx = mirrored ? 1 - cx : cx;
      const px = sx * W, py = cy * H;
      const r  = zW / 2;

      // Disque plein au centroïde
      ctx2d.beginPath();
      ctx2d.arc(px, py, r, 0, Math.PI * 2);
      ctx2d.fillStyle = isCtrl ? 'rgba(0,232,122,0.85)' : 'rgba(255,102,51,0.6)';
      ctx2d.fill();

      if (isCtrl && !controlled) {
        controlled = true;

        const idx = Math.min(N - 1, Math.floor(sx * N));
        const vol = Math.max(0, Math.min(1, 1 - cy * 1.35));

        playNote(idx, vol);
        document.getElementById('note-big').textContent = midiToName(notes[idx]);

        // Volume bar (right edge)
        const bH = vol * H * 0.85;
        ctx2d.fillStyle = `rgba(0,232,122,${0.2 + vol * 0.5})`;
        ctx2d.fillRect(W - 10, H - bH, 8, bH);
      }
    }
  }

  if (!controlled && running) {
    playNote(-1, 0);
    document.getElementById('note-big').textContent = '—';
  }
}

// ── START / STOP ──────────────────────────────────────────────────────────────
const btnStart = document.getElementById('btn-start');
let lastT = -1;

btnStart.addEventListener('click', async () => {
  if (!running) {
    await initAudio();
    await startCamera();
    running = true;
    frameLoop();
    btnStart.textContent = '⏹ STOP';
    btnStart.classList.add('on');
    document.getElementById('status').textContent =
      'Main gauche (votre côté) → pitch (X) & volume (Y haut = fort)';
  } else {
    running = false;
    cancelAnimationFrame(animFrame);
    animFrame = null;
    playNote(-1, 0);
    if (currentStream) { currentStream.getTracks().forEach(t => t.stop()); currentStream = null; }
    video.srcObject = null;
    btnStart.textContent = '▶ START';
    btnStart.classList.remove('on');
    ctx2d.clearRect(0, 0, overlay.width, overlay.height);
    document.getElementById('note-big').textContent = '—';
    document.getElementById('status').textContent = 'Arrêté';
  }
});

// ── CHOIX DU SON ─────────────────────────────────────────────────────────────
document.getElementById('sel-son').addEventListener('change', e => {
  sonMode = e.target.value;
  if (!audioCtx) return;
  const p = PRESETS_SON[sonMode];
  osc.type = p.oscType;
  vibratoOsc.frequency.setTargetAtTime(p.vibratoHz, audioCtx.currentTime, 0.5);
  vibratoGain.gain.setTargetAtTime(p.vibratoDepth, audioCtx.currentTime, 0.5);
  filter.Q.setTargetAtTime(p.filterQ, audioCtx.currentTime, 0.5);
  reverbGain.gain.setTargetAtTime(p.reverbMix, audioCtx.currentTime, 0.5);
  if (padGain) padGain.gain.setTargetAtTime(sonMode === 'padwarm' ? 0.7 : 0, audioCtx.currentTime, 0.5);
});

// ── PLEIN ÉCRAN ───────────────────────────────────────────────────────────────
const btnFs = document.getElementById('btn-fs');
const videoWrap = document.getElementById('video-wrap');
btnFs.addEventListener('click', () => {
  if (!document.fullscreenElement) {
    videoWrap.requestFullscreen().catch(() => {});
  } else {
    document.exitFullscreen();
  }
});
document.addEventListener('fullscreenchange', () => {
  btnFs.textContent = document.fullscreenElement ? '⊡' : '⛶';
  btnFs.title = document.fullscreenElement ? 'Quitter plein écran' : 'Plein écran';
});

})();
</script>
</body>
</html>
